<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CloudFile</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'CloudFile/style.css' %}">
</head>
<body>
    <nav class="topbar">
        <a href="{% url 'home' %}" class="logo">CloudFile</a>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
        </div>
    </nav>

    <main class="main-wrapper" style="display: flex; align-items: center; justify-content: center; flex: 1;">
        <div class="card form-card">
            <h2>Create Your Account</h2>
            <p>Access secure storage features by registering below</p>

            {% if error %}
                <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" class="form-control" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Sign Up Account</button>
            </form>
        </div>
    </main>

    <footer>
        &copy; 2026 CloudFile. All rights reserved.
    </footer>
</body>
</html>
