<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Failed - CloudFile</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'CloudFile/style.css' %}">
</head>
<body>
    <main class="main-wrapper" style="display: flex; align-items: center; justify-content: center; flex: 1;">
        <div class="card status-card">
            <div class="status-icon danger">✕</div>
            <h2>Verification Failed</h2>
            <p>The system is unable to authenticate this verification link. It may have expired or been deactivated.</p>
            <a href="{% url 'signup' %}" class="btn">Register New Account</a>
        </div>
    </main>
</body>
</html>
