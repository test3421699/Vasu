<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - CloudFile</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'CloudFile/style.css' %}">
</head>
<body>
    <main class="main-wrapper" style="display: flex; align-items: center; justify-content: center; flex: 1;">
        <div class="card status-card">
            <div class="status-icon-wrapper warning">
                <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L22 8m-9 11h.01M3 19h18a2 2 0 002-2V7a2 2 0 00-2-2H3a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </div>
            <h2>Verification Dispatched</h2>
            <p>We've sent a link directly to your inbox. Please follow the instructions to secure and verify your credentials.</p>
        </div>
    </main>
</body>
</html>
