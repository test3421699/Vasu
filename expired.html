<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Expired - CloudFile</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'CloudFile/style.css' %}">
</head>
<body>
    <main class="main-wrapper" style="display: flex; align-items: center; justify-content: center; flex: 1;">
        <div class="card status-card">
            <div class="status-icon-wrapper danger">
                <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h2>Link Expired</h2>
            <p>We apologize, but this link has passed its designated access duration and is no longer available.</p>
            <a href="/" class="btn btn-secondary" style="margin-top:10px;">Return to Home</a>
        </div>
    </main>
</body>
</html>
