<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Success - CloudFile</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'CloudFile/style.css' %}">
</head>
<body>
    <nav class="topbar">
        <a href="/" class="logo">CloudFile</a>
    </nav>

    <main class="main-wrapper" style="display: flex; align-items: center; justify-content: center; flex: 1;">
        <div class="card status-card">
            <div class="status-icon success">✓</div>
            <h2>Uploaded Successfully!</h2>
            <p>Your file has been secured on CloudFile and is ready for access.</p>

            <div style="width: 100%;">
                <label for="fileLink" style="font-size:0.8rem; font-weight:600; text-transform:uppercase; color:var(--text-secondary); display:block; text-align:left; margin-bottom:8px;">Shareable Link</label>
                <div class="copy-link-container">
                    <input type="text" id="fileLink" class="copy-input" value="{{ download_link }}" readonly>
                    <button class="btn btn-secondary" onclick="copyLink()" id="copy-btn">Copy Link</button>
                </div>
            </div>

            <div style="display:flex; gap:12px; width: 100%; margin-top:10px;">
                <form action="{% url 'download' file.id %}" method="get" style="flex:1;">
                    <button type="submit" class="btn" style="width:100%;">Preview Page</button>
                </form>
                <a href="/" class="btn btn-secondary" style="flex:1;">To Dashboard</a>
            </div>
        </div>
    </main>

    <!-- Dynamic Modern Notification Toast -->
    <div id="toast" class="toast">Link copied to clipboard!</div>

    <footer>
        &copy; 2026 CloudFile. All rights reserved.
    </footer>

    <script>
        function copyLink() {
            const linkBox = document.getElementById("fileLink");
            const copyBtn = document.getElementById("copy-btn");
            const toast = document.getElementById("toast");

            linkBox.select();
            linkBox.setSelectionRange(0, 99999); // Mobile compatibility
            navigator.clipboard.writeText(linkBox.value);

            // Trigger elegant toast notice instead of alert browser popups
            toast.classList.add("show");
            copyBtn.textContent = "Copied!";
            copyBtn.style.borderColor = "var(--success)";
            
            setTimeout(() => {
                toast.classList.remove("show");
                copyBtn.textContent = "Copy Link";
                copyBtn.style.borderColor = "var(--glass-border)";
            }, 3000);
        }
    </script>
</body>
</html>
